<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fazer login nas Contas do Google</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Roboto", "Arial", sans-serif;
      background: #fff;
      margin: 0;
      color: #202124;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 450px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 48px 40px 36px;
    }
    .logo {
      text-align: center;
      margin-bottom: 16px;
    }
    .logo svg { width: 75px; height: 24px; }
    .title {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      margin: 16px 0 8px;
    }
    .subtitle {
      font-size: 16px;
      text-align: center;
      margin-bottom: 30px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 4px;
    }
    input[type=email], input[type=password] {
      width: 100%;
      padding: 14px 12px;
      font-size: 16px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
    }
    input:focus { border-color: #1a73e8; }
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
    }
    .link {
      color: #1a73e8;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #1765c1; }
    .footer {
      display: flex;
      justify-content: space-between;
      max-width: 450px;
      margin: 16px auto;
      padding: 0 20px;
      font-size: 12px;
      color: #5f6368;
    }
    .footer a { color: #5f6368; text-decoration: none; margin-left: 16px; }
    .danger-banner {
      max-width: 450px;
      margin: 0 auto 12px;
      background: #fff3cd;
      border: 1px solid #ffeeba;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 12px;
      color: #856404;
      text-align: center;
    }
  </style>
</head>
<body>
  <div style="width:100%;max-width:450px">
    <div class="danger-banner">
      ⚠️ <strong>DEMO de laboratório</strong> — esta página é FALSA. Não digite senhas reais.
    </div>

    <div class="card">
      <div class="logo">
        <svg viewBox="0 0 75 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M14.04 12.27c0 4.04-3.16 7.01-7.04 7.01S0 16.31 0 12.27 3.16 5.26 7 5.26c2.13 0 3.65.83 4.78 1.92L9.86 9.1c-.81-.76-1.91-1.35-3.86-1.35-3.16 0-5.63 2.55-5.63 4.52 0 1.97 2.47 4.52 5.63 4.52 2.05 0 3.22-.82 3.97-1.57.61-.61 1.01-1.49 1.17-2.69H6.04V9.99h7.83c.08.41.13.91.13 1.45z" fill="#4285F4"/>
          <path d="M22.27 9.96c-2.5 0-4.54 1.9-4.54 4.52 0 2.6 2.04 4.52 4.54 4.52 2.5 0 4.54-1.92 4.54-4.52 0-2.62-2.04-4.52-4.54-4.52zm0 7.27c-1.37 0-2.55-1.13-2.55-2.74 0-1.63 1.18-2.74 2.55-2.74 1.37 0 2.55 1.11 2.55 2.74 0 1.61-1.18 2.74-2.55 2.74z" fill="#EA4335"/>
          <path d="M32.87 9.96c-2.5 0-4.54 1.9-4.54 4.52 0 2.6 2.04 4.52 4.54 4.52 2.5 0 4.54-1.92 4.54-4.52 0-2.62-2.04-4.52-4.54-4.52zm0 7.27c-1.37 0-2.55-1.13-2.55-2.74 0-1.63 1.18-2.74 2.55-2.74 1.37 0 2.55 1.11 2.55 2.74 0 1.61-1.18 2.74-2.55 2.74z" fill="#FBBC05"/>
          <path d="M47.7 10.24v.81h-.07c-.45-.53-1.31-1.01-2.39-1.01-2.27 0-4.34 1.99-4.34 4.54s2.07 4.52 4.34 4.52c1.08 0 1.94-.48 2.39-1.03h.07v.65c0 1.74-.93 2.67-2.43 2.67-1.22 0-1.98-.88-2.29-1.62l-1.74.72c.5 1.21 1.83 2.69 4.03 2.69 2.34 0 4.32-1.38 4.32-4.74V10.24h-1.89zm-2.29 7.0c-1.37 0-2.51-1.15-2.51-2.72 0-1.6 1.14-2.76 2.51-2.76 1.35 0 2.41 1.16 2.41 2.76 0 1.59-1.06 2.72-2.41 2.72z" fill="#4285F4"/>
          <path d="M51.39 5.7h1.99v13.27h-1.99V5.7z" fill="#34A853"/>
          <path d="M59.81 17.23c-1.01 0-1.73-.46-2.19-1.37l6.04-2.5-.2-.51c-.38-1.01-1.52-2.89-3.86-2.89-2.32 0-4.25 1.83-4.25 4.52 0 2.55 1.91 4.52 4.46 4.52 2.06 0 3.25-1.26 3.75-2L62 16.06c-.51.74-1.21 1.17-2.19 1.17zm-.14-5.49c.79 0 1.46.41 1.69.99l-4.04 1.67c0-1.88 1.34-2.66 2.35-2.66z" fill="#EA4335"/>
          <path d="M68.9 6.59l-2.05.69-2.05-.69V13.13l2.05.69 2.05-.69V6.59z" fill="#4285F4"/>
        </svg>
      </div>

      <div class="title">Fazer login</div>
      <div class="subtitle">Continuar para o Gmail</div>

      <form method="POST" action="/login" autocomplete="off">
        <label for="email">E-mail ou telefone</label>
        <input type="email" id="email" name="email" required autofocus>

        <label for="password" style="margin-top:18px">Senha</label>
        <input type="password" id="password" name="password" required>

        <div style="margin-top:8px"><a class="link" href="#">Esqueceu o e-mail?</a></div>

        <p style="font-size:14px;color:#5f6368;margin-top:30px">
          Não está no seu computador? Use o modo visitante para fazer login com privacidade.
        </p>

        <div class="row">
          <a href="#" class="link">Criar conta</a>
          <button type="submit">Avançar</button>
        </div>
      </form>
    </div>

    <div class="footer">
      <select style="border:none;background:none;color:#5f6368;font-size:12px">
        <option>Português (Brasil)</option>
      </select>
      <div>
        <a href="#">Ajuda</a>
        <a href="#">Privacidade</a>
        <a href="#">Termos</a>
      </div>
    </div>
  </div>
</body>
</html>
